<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book Barber</title>
    <style>
        /* ── Theme tokens from Telegram ── */
        :root {
            --bg: var(--tg-theme-bg-color, #111111);
            --bg2: var(--tg-theme-secondary-bg-color, #1c1c1e);
            --text: var(--tg-theme-text-color, #f5f5f5);
            --hint: var(--tg-theme-hint-color, #8e8e93);
            --btn: var(--tg-theme-button-color, #d4a24e);
            --btn-text: var(--tg-theme-button-text-color, #111111);
            --danger: #ff453a;
            --success: #30d158;
            --glow: rgba(212,162,78,0.35);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ── Language bar ── */
        .lang-bar {
            display: flex; gap: 6px; justify-content: center;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .lang-pill {
            padding: 4px 10px; border-radius: 20px; font-size: 12px;
            background: var(--bg2); border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; transition: all .25s; opacity: .5;
            font-weight: 600;
        }
        .lang-pill.active { opacity: 1; background: var(--btn); color: var(--btn-text); border-color: var(--btn); }

        /* ── Section headers ── */
        h2 { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.3px; }
        h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

        /* ── Style grid ── */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }
        .card {
            background: var(--bg2); border-radius: var(--radius);
            overflow: hidden; cursor: pointer; position: relative;
            border: 2px solid transparent;
            transition: transform .25s cubic-bezier(.4,0,.2,1), border-color .25s, box-shadow .25s;
        }
        .card:active { transform: scale(.96); }
        .card.selected {
            border-color: var(--btn);
            box-shadow: 0 0 20px var(--glow), inset 0 0 20px rgba(212,162,78,0.05);
        }
        .card img {
            width: 100%; height: 120px; object-fit: cover; display: block;
            filter: brightness(.9); transition: filter .3s;
        }
        .card.selected img { filter: brightness(1.05); }
        .card .badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
            padding: 3px 8px; border-radius: 10px; font-size: 11px;
            font-weight: 700; color: var(--btn);
        }
        .card .label {
            padding: 8px 6px; font-size: 11px; text-align: center;
            font-weight: 600; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Detail panel ── */
        .detail {
            background: var(--bg2); border-radius: var(--radius);
            padding: 16px; margin-bottom: 20px; display: none;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .detail .price { color: var(--btn); font-size: 22px; font-weight: 800; }
        .detail .meta { color: var(--hint); font-size: 13px; margin-top: 4px; }

        /* ── Date / Time ── */
        .section { margin-bottom: 20px; }
        .quick-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .pill {
            flex: 1; padding: 14px; text-align: center; font-weight: 700;
            background: var(--bg2); border-radius: 12px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all .25s; font-size: 14px;
        }
        .pill:active { transform: scale(.96); }
        .pill.active { background: var(--btn); color: var(--btn-text); border-color: var(--btn); box-shadow: 0 4px 16px var(--glow); }

        .time-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
        .time-pill {
            padding: 14px 8px; text-align: center; font-weight: 700;
            background: var(--bg2); border-radius: 12px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all .25s; font-size: 14px;
        }
        .time-pill:active { transform: scale(.96); }
        .time-pill.active { background: var(--btn); color: var(--btn-text); border-color: var(--btn); box-shadow: 0 4px 16px var(--glow); }
        .time-pill.disabled { opacity: .3; pointer-events: none; }

        input[type="date"] { display: none; }

        /* ── Pay button ── */
        .pay-btn {
            width: 100%; padding: 18px; border: none; border-radius: var(--radius);
            font-size: 17px; font-weight: 800; cursor: pointer;
            background: var(--btn); color: var(--btn-text);
            box-shadow: 0 6px 24px var(--glow);
            transition: transform .2s, box-shadow .2s;
            margin-top: 8px;
        }
        .pay-btn:active { transform: scale(.97); }
        .pay-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; color: #999; }
        .pay-btn.test { background: #555; color: var(--text); box-shadow: none; margin-top: 10px; }

        /* ── Verifying screen ── */
        #verify {
            display: none; text-align: center; padding-top: 120px;
        }
        
        /* ── Premium Spinner to Check/X Animation ── */
        .anim-wrapper {
            width: 80px; height: 80px; 
            margin: 0 auto 30px;
        }
        .payment-svg { width: 100%; height: 100%; }
        
        /* The Spinning Circle */
        .spinner-path {
            stroke: var(--btn);
            stroke-dasharray: 90, 150;
            stroke-dashoffset: 0;
            transform-origin: center;
            animation: rotate 1.4s linear infinite;
        }
        
        /* Hidden Check and X paths */
        .check-path, .fail-path {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            opacity: 0;
        }
        .check-path { stroke: var(--success); }
        .fail-path { stroke: var(--danger); }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* SUCCESS STATE: Circle stops, Checkmark draws */
        #anim-wrapper.success .spinner-path {
            animation: none;
            stroke-dashoffset: -35;
            stroke: var(--success);
            transition: stroke 0.3s, stroke-dashoffset 0.6s ease-in-out;
        }
        #anim-wrapper.success .check-path {
            opacity: 1;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.4s ease-in-out 0.4s;
        }
        #anim-wrapper.success { animation: pop 0.4s ease 0.8s; }

        /* FAILURE STATE: Circle stops, X draws */
        #anim-wrapper.failed .spinner-path {
            animation: none;
            stroke-dashoffset: -35;
            stroke: var(--danger);
            transition: stroke 0.3s, stroke-dashoffset 0.6s ease-in-out;
        }
        #anim-wrapper.failed .fail-path {
            opacity: 1;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.4s ease-in-out 0.4s;
        }
        #anim-wrapper.failed { animation: shake 0.5s ease 0.8s; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 20px var(--success)); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .verify-text { text-align: center; transition: all 0.3s; }
        .verify-text h2 { font-size: 20px; font-weight: 700; transition: color 0.3s; margin-bottom: 8px; }
        .verify-text.success h2 { color: var(--success); }
        .verify-text.failed h2 { color: var(--danger); }
        .verify-text p { color: var(--hint); font-size: 14px; line-height: 1.5; }

        /* ── Empty state ── */
        .empty { text-align: center; padding: 60px 20px; color: var(--hint); }
        .empty .icon { font-size: 48px; margin-bottom: 16px; }

        .hidden { display: none !important; }

        /* ── Subtle noise overlay ── */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; opacity: .03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- ═══════════ BOOKING SCREEN ═══════════ -->
<div class="container" id="booking">

    <!-- Language switcher -->
    <div class="lang-bar" id="lang-bar"></div>

    <h2 id="h-title">✂️ Choose a Style</h2>

    <!-- Styles grid (populated by JS) -->
    <div class="grid" id="grid"></div>
    <div class="empty hidden" id="empty-state">
        <div class="icon">💈</div>
        <p id="empty-text">No styles available yet.</p>
    </div>

    <!-- Detail panel -->
    <div class="detail" id="detail">
        <div class="price" id="d-price">0 ETB</div>
        <div style="margin-top:8px;font-weight:600;" id="d-name"></div>
        <div class="meta" id="d-desc"></div>
        <div class="meta" id="d-time"></div>
    </div>

    <!-- Date section -->
    <div class="section hidden" id="sec-date">
        <h3 id="h-when">📅 When?</h3>
        <div class="quick-row">
            <div class="pill" id="btn-today" onclick="pickDate('today')"></div>
            <div class="pill" id="btn-tomorrow" onclick="pickDate('tomorrow')"></div>
        </div>
        <div class="quick-row">
            <input type="date" id="cal" onchange="pickDate('cal')">
            <div class="pill" style="font-size:13px;" onclick="document.getElementById('cal').showPicker()" id="btn-cal"></div>
        </div>
    </div>

    <!-- Time section -->
    <div class="section hidden" id="sec-time">
        <h3 id="h-time">⏰ Select Time</h3>
        <div class="time-grid" id="times"></div>
    </div>

    <!-- Pay buttons -->
    <button class="pay-btn hidden" id="btn-pay" onclick="startPayment()"></button>
    <button class="pay-btn test hidden" id="btn-test" onclick="startFake()"></button>
</div>

<!-- ═══════════ VERIFYING SCREEN ═══════════ -->
<div class="container" id="verify">
    <div class="anim-wrapper" id="anim-wrapper">
        <svg class="payment-svg" viewBox="0 0 52 52">
            <circle class="spinner-path" cx="26" cy="26" r="20" fill="none" stroke-width="4" stroke-linecap="round"/>
            <path class="check-path" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            <path class="fail-path" fill="none" stroke-width="4" stroke-linecap="round" d="M16 16 L36 36 M36 16 L16 36"/>
        </svg>
    </div>
    <div class="verify-text" id="verify-text">
        <h2 id="v-title">Verifying Payment…</h2>
        <p id="v-sub">Waiting for bank confirmation.</p>
    </div>
</div>

<script>
// ──────────────── CONFIG ────────────────
const API = window.location.origin;
const PARAMS = new URLSearchParams(window.location.search);
const tg = window.Telegram.WebApp;

let currentLang = PARAMS.get("lang") || "en";
let i18n = {};  // populated from server
let services = [];
let selected = null;  // service object
let selectedDate = null;
let selectedTime = null;
let txRef = null;

// ──────────────── INIT ────────────────
tg.ready();
tg.expand();

(async function init() {
    // Load translations
    try {
        const r = await fetch(`${API}/api/i18n/${currentLang}`);
        i18n = await r.json();
    } catch(e) { console.warn("i18n load failed", e); }

    // Load services
    try {
        const r = await fetch(`${API}/api/services`);
        const d = await r.json();
        services = d.services || [];
    } catch(e) { console.error("services load failed", e); }

    renderLangBar();
    applyText();
    renderGrid();
})();

// ──────────────── I18N HELPER ────────────────
function t(key) {
    return i18n[key] || key;
}

function applyText() {
    document.getElementById("h-title").textContent = "✂️ " + t("w_title");
    document.getElementById("h-when").textContent = "📅 " + t("w_when");
    document.getElementById("h-time").textContent = "⏰ " + t("w_select_time");
    document.getElementById("btn-today").textContent = t("w_today");
    document.getElementById("btn-tomorrow").textContent = t("w_tomorrow");
    document.getElementById("btn-cal").textContent = "📆 " + t("w_pick_date");
    document.getElementById("btn-pay").textContent = "💳 " + t("w_pay");
    document.getElementById("btn-test").textContent = t("w_test");
    document.getElementById("v-title").textContent = t("w_verifying");
    document.getElementById("v-sub").textContent = t("w_verifying_sub");
    document.getElementById("empty-text").textContent = t("w_no_styles");
}

// ──────────────── LANGUAGE BAR ────────────────
const LANG_LIST = [
    {code:"en", flag:"🇬🇧", label:"EN"},
    {code:"am", flag:"🇪🇹", label:"አማ"},
    {code:"om", flag:"🟢", label:"OM"},
    {code:"ti", flag:"🔵", label:"ትግ"},
    {code:"so", flag:"⭐", label:"SO"},
    {code:"aa", flag:"🔴", label:"AF"},
];

function renderLangBar() {
    const bar = document.getElementById("lang-bar");
    bar.innerHTML = LANG_LIST.map(l =>
        `<div class="lang-pill ${l.code===currentLang?'active':''}" onclick="switchLang('${l.code}')">${l.flag} ${l.label}</div>`
    ).join("");
}

async function switchLang(code) {
    currentLang = code;
    document.querySelectorAll(".lang-pill").forEach((el,i) => {
        el.classList.toggle("active", LANG_LIST[i].code === code);
    });
    try {
        const r = await fetch(`${API}/api/i18n/${code}`);
        i18n = await r.json();
    } catch(e) {}
    applyText();
}

// ──────────────── RENDER GRID ────────────────
function renderGrid() {
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty-state");

    if (!services.length) {
        grid.classList.add("hidden");
        empty.classList.remove("hidden");
        return;
    }

    empty.classList.add("hidden");
    grid.classList.remove("hidden");

    grid.innerHTML = services.map(s => `
        <div class="card" id="card-${s.id}" onclick="selectService(${s.id})">
            ${s.image_url ? `<img src="${s.image_url}" alt="${s.name}" loading="lazy">` :
              `<div style="height:120px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:36px;">✂️</div>`}
            <div class="badge">${s.price} ETB</div>
            <div class="label">${s.name}</div>
        </div>
    `).join("");
}

function selectService(id) {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
    document.getElementById(`card-${id}`).classList.add("selected");
    selected = services.find(s => s.id === id);

    const det = document.getElementById("detail");
    det.style.display = "block";
    document.getElementById("d-price").textContent = selected.price + " ETB";
    document.getElementById("d-name").textContent = selected.name;
    document.getElementById("d-desc").textContent = selected.description || "";
    document.getElementById("d-time").textContent = selected.est_time ? "⏱️ " + t("w_est") + ": " + selected.est_time : "";

    document.getElementById("sec-date").classList.remove("hidden");
}

// ──────────────── DATE ────────────────
function pickDate(type) {
    let d = new Date();
    if (type === "tomorrow") d.setDate(d.getDate() + 1);
    if (type === "cal") {
        const v = document.getElementById("cal").value;
        if (!v) return;
        d = new Date(v + "T00:00:00");
    }
    selectedDate = d.toISOString().split("T")[0];
    document.querySelectorAll("#sec-date .pill").forEach(p => p.classList.remove("active"));
    if (type === "today") document.getElementById("btn-today").classList.add("active");
    else if (type === "tomorrow") document.getElementById("btn-tomorrow").classList.add("active");
    document.getElementById("cal").value = "";
    document.getElementById("sec-time").classList.remove("hidden");
    loadTimes(selectedDate);
}

async function loadTimes(dateStr) {
    const grid = document.getElementById("times");
    grid.innerHTML = `<div style="grid-column:span 3;text-align:center;color:var(--hint);padding:20px;">${t("w_loading")}</div>`;
    try {
        const r = await fetch(`${API}/api/get-times?date=${dateStr}`);
        const d = await r.json();
        const times = d.available_times || [];
        if (!times.length) {
            grid.innerHTML = `<div style="grid-column:span 3;text-align:center;color:var(--hint);padding:20px;">${t("w_no_times")}</div>`;
            return;
        }
        grid.innerHTML = times.map(t => {
            const [h,m] = t.split(":");
            const ap = h >= 12 ? "PM" : "AM";
            const h12 = h % 12 || 12;
            return `<div class="time-pill" onclick="selectTime('${t}',this)">${h12}:${m} ${ap}</div>`;
        }).join("");
    } catch(e) {
        grid.innerHTML = `<div style="grid-column:span 3;text-align:center;color:var(--danger);padding:20px;">Error</div>`;
    }
}

function selectTime(t, el) {
    selectedTime = t;
    document.querySelectorAll(".time-pill").forEach(p => p.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("btn-pay").classList.remove("hidden");
    document.getElementById("btn-test").classList.remove("hidden");
}

// ──────────────── ANIMATION STATES ────────────────
function showVerify() {
    document.getElementById("booking").classList.add("hidden");
    document.getElementById("verify").style.display = "block";
    
    // Reset to spinning state
    document.getElementById("anim-wrapper").className = "anim-wrapper";
    document.getElementById("verify-text").className = "verify-text";
    document.getElementById("v-title").textContent = t("w_verifying");
    document.getElementById("v-title").style.color = "var(--text)";
    document.getElementById("v-sub").textContent = t("w_verifying_sub");
}

function showSuccessAnim() {
    document.getElementById("anim-wrapper").classList.add("success");
    document.getElementById("verify-text").classList.add("success");
    document.getElementById("v-title").textContent = "Payment Completed!";
    document.getElementById("v-sub").textContent = "Confirming your booking...";
}

function showFailureAnim() {
    document.getElementById("anim-wrapper").classList.add("failed");
    document.getElementById("verify-text").classList.add("failed");
    document.getElementById("v-title").textContent = "Payment Failed!";
    document.getElementById("v-sub").textContent = "Please try again.";
}

function finish() {
    const payload = {
        tx_ref: txRef,
        image_url: selected.image_url || null,
        style_name: selected.name,
        style_desc: selected.description || null,
    };
    
    // ALWAYS use API fallback — it's 100% reliable
    // sendData is unreliable (silently fails, never closes app)
    fetch(`${API}/api/confirm-booking`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: tg.initDataUnsafe.user.id,
            tx_ref: txRef,
            image_url: selected.image_url || null,
            style_name: selected.name,
            style_desc: selected.description || null,
        })
    }).catch(e => {
        console.log("API fallback error:", e);
    }).finally(() => {
        // ALWAYS close after API call finishes
        setTimeout(() => { 
            try { tg.close(); } catch(e) {} 
        }, 500);
    });
}
// ──────────────── FAKE PAYMENT ────────────────
async function startFake() {
    if (!selected || !selectedDate || !selectedTime) return alert(t("w_complete"));
    const btn = document.getElementById("btn-test");
    btn.disabled = true;
    btn.textContent = t("w_testing");

    try {
        const r = await fetch(`${API}/api/fake-payment`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                chat_id: tg.initDataUnsafe.user.id,
                first_name: tg.initDataUnsafe.user.first_name,
                service_id: selected.id,
                service_name: selected.name,
                service_price: selected.price,
                date: selectedDate,
                time: selectedTime,
            })
        });
        const d = await r.json();
        if (d.status === "success") {
            txRef = d.tx_ref;
            showVerify();
            // 1. Spin for 1.2 seconds
            setTimeout(() => {
                // 2. Transform to Checkmark
                showSuccessAnim();
                // 3. Wait for animation to finish, then close
                setTimeout(() => { finish(); }, 1800);
            }, 1200);
        } else {
            showVerify();
            showFailureAnim();
            btn.disabled = false;
            btn.textContent = t("w_test");
        }
    } catch(e) {
        showVerify();
        showFailureAnim();
        btn.disabled = false;
        btn.textContent = t("w_test");
    }
}

// ──────────────── REAL PAYMENT ────────────────
async function startPayment() {
    if (!selected || !selectedDate || !selectedTime) return alert(t("w_complete"));
    const btn = document.getElementById("btn-pay");
    btn.disabled = true;
    btn.textContent = t("w_connecting");

    try {
        const r = await fetch(`${API}/api/create-payment`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                chat_id: tg.initDataUnsafe.user.id,
                first_name: tg.initDataUnsafe.user.first_name,
                service_id: selected.id,
                service_name: selected.name,
                service_price: selected.price,
                date: selectedDate,
                time: selectedTime,
            })
        });
        const d = await r.json();
        if (d.status === "success") {
            txRef = d.tx_ref;
            showVerify();
            window.open(d.checkout_url, "_blank");
            pollStatus();
        } else {
            alert("Error: " + (d.error || JSON.stringify(d)));
            btn.disabled = false;
            btn.textContent = "💳 " + t("w_pay");
        }
    } catch(e) {
        alert(t("w_net_err"));
        btn.disabled = false;
        btn.textContent = "💳 " + t("w_pay");
    }
}

function pollStatus() {
    const iv = setInterval(async () => {
        try {
            const r = await fetch(`${API}/api/check-status?tx_ref=${txRef}`);
            const d = await r.json();
            if (d.payment_status === "paid") {
                clearInterval(iv);
                showSuccessAnim();
                setTimeout(() => { finish(); }, 1800);
            } else if (d.payment_status === "failed") {
                clearInterval(iv);
                showFailureAnim();
                setTimeout(() => { location.reload(); }, 2500);
            }
        } catch(e) {}
    }, 3000);
}
</script>
</body>
</html>
