<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barber Shop Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-overlay: rgba(15, 15, 15, 0.85);
            --card-bg: rgba(30, 30, 30, 0.95);
            --accent: #FFD700;
            --accent-hover: #FFE650;
            --text-main: #FFFFFF;
            --text-muted: #B0B0B0;
            --danger: #FF4D4D;
            --success: #4CAF50;
            --border: rgba(255, 215, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('https://z-cdn-media.chatglm.cn/files/52cd203a-0fad-4b5c-81dc-b29d81a3cd81.png?auth_key=1884408975-024f21b1eada43dda5a78ce819673168-0-8910d87f6fc89573557bbe99501f5eb1');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: var(--text-main);
        }

        .overlay {
            background: var(--bg-overlay);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 500px;
        }

        .header h1 {
            color: var(--accent);
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .dot {
            height: 8px;
            width: 8px;
            background-color: #444;
            border-radius: 50%;
            transition: 0.3s;
        }
        .dot.active {
            background-color: var(--accent);
            width: 24px;
            border-radius: 4px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            color: var(--accent);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Style List - BIGGER */
        .style-item {
            display: flex;
            align-items: center;
            background: #222;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .style-item.selected {
            border-color: var(--accent);
            background: rgba(255, 215, 0, 0.1);
        }
        .style-thumb {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
            background: #111;
            cursor: zoom-in;
            border: 1px solid #444;
        }
        .style-info {
            flex: 1;
        }
        .style-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .style-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .style-meta {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
        }
        .style-price { color: var(--accent); font-weight: bold; }
        .style-time { color: var(--text-muted); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .grid-item {
            background: #222;
            border: 2px solid transparent;
            color: #fff;
            padding: 12px 5px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .grid-item.selected {
            border-color: var(--accent);
            background: rgba(255, 215, 0, 0.1);
            color: var(--accent);
        }
        .grid-item:disabled {
            background: #1a1a1a;
            color: #555;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 15px;
            color-scheme: dark;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: transparent;
            border: 2px solid #444;
            color: #fff;
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .spinner {
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loading-text { color: var(--text-muted); font-size: 14px; text-align: center; }
        .highlight { color: var(--accent); font-weight: bold; }

        .summary-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }

        /* Image Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 95%;
            max-height: 90vh;
            border-radius: 10px;
            border: 2px solid var(--accent);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">
            <h1 id="shopName">Elite Cuts</h1>
            <p id="wTitle">Choose a Style</p>
        </div>

        <div class="step-indicator">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
            <div class="dot" id="dot4"></div>
        </div>

        <!-- LOADING -->
        <div class="card" id="loadingCard">
            <div class="spinner-container">
                <div class="spinner"></div>
                <div class="loading-text">Loading...</div>
            </div>
        </div>

        <!-- STEP 1: STYLES -->
        <div class="card hidden" id="step1">
            <div class="section-title">✂️ <span id="wTitle2">Choose a Style</span></div>
            <div id="stylesList"></div>
        </div>

        <!-- STEP 2: DATE -->
        <div class="card hidden" id="step2">
            <div class="section-title">📅 <span id="wWhen">When do you want to come?</span></div>
            <div class="grid" style="margin-bottom: 15px;">
                <div class="grid-item" id="btnToday">Today</div>
                <div class="grid-item" id="btnTomorrow">Tomorrow</div>
                <div class="grid-item" id="btnPickDate">📆 Pick Date</div>
            </div>
            <input type="date" id="datePicker" class="hidden" min="">
            <button class="btn btn-secondary" onclick="goToStep(1)">🔙</button>
        </div>

        <!-- STEP 3: TIME -->
        <div class="card hidden" id="step3">
            <div class="section-title">🕒 <span id="wSelectTime">Select Time</span></div>
            <div id="timeGrid" class="grid"></div>
            <button class="btn btn-secondary" onclick="goToStep(2)">🔙</button>
        </div>

        <!-- STEP 4: CHECKOUT -->
        <div class="card hidden" id="step4">
            <div class="section-title">💳 Checkout</div>
            <div class="summary-box">
                <div class="summary-row"><span>Style:</span> <span id="sumStyle" class="highlight"></span></div>
                <div class="summary-row"><span>Date:</span> <span id="sumDate"></span></div>
                <div class="summary-row"><span>Time:</span> <span id="sumTime"></span></div>
                <div class="summary-row"><span>Total Price:</span> <span id="sumPrice" class="highlight"></span></div>
                <div class="summary-row" style="border-top: 1px solid #444; padding-top: 8px;">
                    <span>Deposit Now:</span> <span class="highlight">50 ETB</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="payBtn" onclick="initiatePayment(false)">
                💳 Pay 50 ETB Deposit
            </button>
            <button class="btn btn-secondary" id="testBtn" onclick="initiatePayment(true)">
                🛠️ Test: Skip Payment
            </button>
            <button class="btn btn-danger" onclick="goToStep(3)">🔙</button>
        </div>

        <!-- PROCESSING PAYMENT -->
        <div class="card hidden" id="processing">
            <div class="spinner-container">
                <div class="spinner"></div>
                <div class="loading-text" id="procText">Verifying Payment…</div>
                <div class="loading-text" style="font-size: 12px; margin-top: 10px;" id="procSubText">Waiting for bank confirmation. Please don't close this page.</div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imgModal" class="modal" onclick="closeModal()">
        <img id="modalImg" src="">
    </div>

    <script>
        const SHOP_NAME = "Elite Cuts";
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0f0f0f");
        tg.setBackgroundColor("#0f0f0f");

        let state = {
            lang: "en",
            i18n: {},
            chat_id: null,
            styles: [],
            selectedStyle: null,
            selectedDate: null,
            selectedTime: null,
            dateLabel: null,
            tx_ref: null
        };

        async function init() {
            document.getElementById('shopName').innerText = SHOP_NAME;
            state.chat_id = tg.initDataUnsafe?.user?.id || "123456789";
            
            const urlParams = new URLSearchParams(window.location.search);
            let lang = urlParams.get('lang');
            
            if (!lang) {
                try {
                    const res = await fetch(`/api/user-lang?chat_id=${state.chat_id}`);
                    const data = await res.json();
                    lang = data.lang || "en";
                } catch (e) { lang = "en"; }
            }
            state.lang = lang;

            const tx_ref = urlParams.get('tx_ref');
            if (tx_ref) {
                state.tx_ref = tx_ref;
                const savedStyle = sessionStorage.getItem('pending_style');
                if (savedStyle) state.selectedStyle = JSON.parse(savedStyle);
                showProcessing();
                pollStatus();
                return;
            }

            await loadI18n();
            await loadStyles();
            goToStep(1);
        }

        async function loadI18n() {
            try {
                const res = await fetch(`/api/i18n/${state.lang}`);
                state.i18n = await res.json();
                updateTexts();
            } catch (e) { console.error("Failed to load i18n", e); }
        }

        function updateTexts() {
            const t = state.i18n;
            document.getElementById('wTitle').innerText = t.w_title || "Choose a Style";
            document.getElementById('wTitle2').innerText = t.w_title || "Choose a Style";
            document.getElementById('wWhen').innerText = t.w_when || "When do you want to come?";
            document.getElementById('wSelectTime').innerText = t.w_select_time || "Select Time";
            document.getElementById('btnToday').innerText = t.w_today || "Today";
            document.getElementById('btnTomorrow').innerText = t.w_tomorrow || "Tomorrow";
            document.getElementById('btnPickDate').innerText = t.w_pick_date || "📆 Pick Date";
            document.getElementById('payBtn').innerText = `💳 ${t.w_pay || "Pay 50 ETB Deposit"}`;
            document.getElementById('testBtn').innerText = `🛠️ ${t.w_test || "Test: Skip Payment"}`;
            document.getElementById('procText').innerText = t.w_verifying || "Verifying Payment…";
            document.getElementById('procSubText').innerText = t.w_verifying_sub || "Waiting for bank confirmation. Please don't close this page.";
        }

        async function loadStyles() {
            try {
                const res = await fetch('/api/services');
                const data = await res.json();
                state.styles = data.services || [];
                renderStyles();
            } catch (e) {
                document.getElementById('stylesList').innerHTML = `<p style="color:red; text-align:center;">Failed to load styles.</p>`;
            }
        }

        function renderStyles() {
            const list = document.getElementById('stylesList');
            if (state.styles.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:var(--text-muted);">${state.i18n.w_no_styles || "No styles available yet."}</p>`;
                return;
            }

            list.innerHTML = state.styles.map(s => `
                <div class="style-item" onclick="selectStyle(${s.id})" id="style-${s.id}">
                    ${s.image_url 
                        ? `<img src="${s.image_url}" class="style-thumb" onclick="event.stopPropagation(); openModal('${s.image_url}')" alt="${s.name}">` 
                        : `<img src="https://via.placeholder.com/90?text=?" class="style-thumb" alt="?">`}
                    <div class="style-info">
                        <div class="style-name">${s.name}</div>
                        <div class="style-desc">${s.description || ''}</div>
                        <div class="style-meta">
                            <span class="style-price">${s.price} ETB</span>
                            <span class="style-time">⏱️ ${s.est_time || ''}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imgModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('imgModal').style.display = 'none';
        }

        function goToStep(step) {
            document.getElementById('loadingCard').classList.add('hidden');
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`step${i}`).classList.add('hidden');
                document.getElementById(`dot${i}`).classList.remove('active');
            }
            document.getElementById(`step${step}`).classList.remove('hidden');
            document.getElementById(`dot${step}`).classList.add('active');

            if (step === 1) loadStyles();
            if (step === 2) initDateButtons();
            if (step === 4) updateCheckoutSummary();
        }

        function selectStyle(id) {
            state.selectedStyle = state.styles.find(s => s.id === id);
            document.querySelectorAll('.style-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`style-${id}`).classList.add('selected');
            setTimeout(() => goToStep(2), 300);
        }

        function initDateButtons() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            document.getElementById('datePicker').min = today.toISOString().split('T')[0];
            document.getElementById('datePicker').onchange = (e) => {
                if (e.target.value) {
                    state.selectedDate = e.target.value;
                    state.dateLabel = new Date(e.target.value).toLocaleDateString(state.lang, { weekday: 'short', month: 'short', day: 'numeric' });
                    loadTimes();
                }
            };

            document.getElementById('btnToday').onclick = () => {
                state.selectedDate = today.toISOString().split('T')[0];
                state.dateLabel = state.i18n.w_today || "Today";
                loadTimes();
            };
            document.getElementById('btnTomorrow').onclick = () => {
                state.selectedDate = tomorrow.toISOString().split('T')[0];
                state.dateLabel = state.i18n.w_tomorrow || "Tomorrow";
                loadTimes();
            };
            document.getElementById('btnPickDate').onclick = () => {
                document.getElementById('datePicker').classList.remove('hidden');
                document.getElementById('datePicker').focus();
            };
        }

        async function loadTimes() {
            const timeGrid = document.getElementById('timeGrid');
            timeGrid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 20px;">${state.i18n.w_loading || "Loading times…"}</div>`;
            goToStep(3);

            try {
                const res = await fetch(`/api/get-times?date=${state.selectedDate}`);
                const data = await res.json();
                const times = data.available_times || [];

                if (times.length === 0) {
                    timeGrid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted);">${state.i18n.w_no_times || "No times available for this date."}</p>`;
                    return;
                }

                timeGrid.innerHTML = times.map(t => {
                    const formatted = formatTime(t);
                    return `<div class="grid-item" onclick="selectTime('${t}', '${formatted}')">${formatted}</div>`;
                }).join('');

            } catch (e) { timeGrid.innerHTML = `<p style="color:red;">Error loading times.</p>`; }
        }

        function selectTime(timeVal, formattedTime) {
            state.selectedTime = timeVal;
            document.querySelectorAll('#timeGrid .grid-item').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
            setTimeout(() => goToStep(4), 300);
        }

        function updateCheckoutSummary() {
            if (!state.selectedStyle) return;
            document.getElementById('sumStyle').innerText = state.selectedStyle.name;
            document.getElementById('sumDate').innerText = state.dateLabel;
            document.getElementById('sumTime').innerText = formatTime(state.selectedTime);
            document.getElementById('sumPrice').innerText = `${state.selectedStyle.price} ETB`;
        }

        function formatTime(t) {
            const [h, m] = t.split(':');
            const hour = parseInt(h);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const formattedHour = hour % 12 || 12;
            return `${formattedHour}:${m} ${ampm}`;
        }

        async function initiatePayment(isTest) {
            if (!state.selectedStyle || !state.selectedDate || !state.selectedTime) {
                alert(state.i18n.w_complete || "Please complete all steps above.");
                return;
            }

            sessionStorage.setItem('pending_style', JSON.stringify(state.selectedStyle));
            showProcessing();
            document.getElementById('procText').innerText = state.i18n.w_connecting || "Connecting to Chapa…";

            const endpoint = isTest ? '/api/fake-payment' : '/api/create-payment';
            const payload = {
                chat_id: state.chat_id,
                first_name: tg.initDataUnsafe?.user?.first_name || "Customer",
                service_name: state.selectedStyle.name,
                service_price: state.selectedStyle.price,
                date: state.selectedDate,
                time: state.selectedTime
            };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (data.status === "success") {
                    state.tx_ref = data.tx_ref;
                    if (isTest) {
                        document.getElementById('procText').innerText = state.i18n.w_testing || "Processing test…";
                        setTimeout(pollStatus, 1000);
                    } else {
                        window.location.href = data.checkout_url;
                    }
                } else {
                    throw new Error(data.error || "Failed to initiate payment");
                }
            } catch (e) {
                hideProcessing();
                alert((state.i18n.w_net_err || "Network error.") + "\n" + e.message);
                goToStep(4);
            }
        }

        async function pollStatus() {
            if (!state.tx_ref) return;
            document.getElementById('procText').innerText = state.i18n.w_verifying || "Verifying Payment…";
            
            let attempts = 0;
            const interval = setInterval(async () => {
                attempts++;
                try {
                    const res = await fetch(`/api/check-status?tx_ref=${state.tx_ref}`);
                    const data = await res.json();
                    console.log("Polling:", data); // Check console to see status
                    
                    if (data.payment_status === "paid") {
                        clearInterval(interval);
                        sendToBot();
                    } else if (attempts >= 15) {
                        clearInterval(interval);
                        hideProcessing();
                        alert(state.i18n.w_pay_fail || "Payment failed or timed out. Try again.");
                        goToStep(4);
                    }
                } catch (e) { console.error("Polling error", e); }
            }, 1500);
        }

        function sendToBot() {
            const payload = {
                tx_ref: state.tx_ref,
                image_url: state.selectedStyle.image_url,
                style_name: state.selectedStyle.name,
                style_desc: state.selectedStyle.description
            };
            
            try {
                tg.sendData(JSON.stringify(payload));
                // Fallback in case Telegram sendData fails silently
                setTimeout(() => {
                    fetch('/api/confirm-booking', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...payload, chat_id: state.chat_id })
                    }).then(() => tg.close());
                }, 1500);
            } catch (e) {
                fetch('/api/confirm-booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...payload, chat_id: state.chat_id })
                }).then(() => tg.close());
            }
        }

        function showProcessing() {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('processing').classList.remove('hidden');
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        }

        function hideProcessing() {
            document.getElementById('processing').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
